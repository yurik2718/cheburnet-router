name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # bats-core / bats-support / bats-assert подтягиваются как submodules
          submodules: recursive

      - name: Run unit + integration tests (bats-core)
        run: make test
