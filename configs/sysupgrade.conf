/usr/bin/dns-provider
/usr/bin/dns-healthcheck
/usr/bin/awg-watchdog
/usr/bin/log-snapshot
/usr/bin/sqm-tune
/usr/bin/travel-connect
/usr/bin/travel-portal
/usr/bin/travel-vpn-on
/usr/bin/travel-tether
/usr/bin/travel-scan
/usr/bin/travel-wifi
/usr/bin/travel-mac
/usr/bin/travel-check

## === Hotplug / init.d (custom) ===
/etc/hotplug.d/button/10-vpn-mode
/etc/init.d/vpn-mode

## === State files ===
/etc/vpn-mode.state

## === AWG: CRITICAL — содержит приватный ключ, без файла VPN не встанет ===
/etc/amnezia/

## === Adblock-lean settings (blocklist будет перекачан с GitHub) ===
/etc/adblock-lean/

## === Persistent logs (опционально; если не хотите - удалите строку) ===
/root/logs/

## === Сохранённые Wi-Fi профили для travel-wifi ===
/etc/travel-wifi/

## === NAS: ksmbd пароли (ksmbdpwd.db!) + hotplug auto-mount ===
/etc/ksmbd/
/etc/hotplug.d/block/10-usb-storage-mount
