## This file contains files and directories that should
## be preserved during an upgrade.

## === Основные скрипты управления (не из apk, будут стёрты при sysupgrade) ===
/usr/bin/vpn-mode
/usr/bin/dns-provider
/usr/bin/awg-watchdog
/usr/bin/travel-connect
/usr/bin/travel-portal
/usr/bin/travel-vpn-on
/usr/bin/travel-check

## === Hotplug / init.d (кастомные) ===
/etc/hotplug.d/button/10-vpn-mode
/etc/init.d/vpn-mode

## === Состояние режима VPN ===
/etc/vpn-mode.state

## === AWG: КРИТИЧНО — содержит приватный ключ ===
/etc/amnezia/

## === Настройки adblock-lean (блок-листы перекачиваются заново) ===
/etc/adblock-lean/
